<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Modern Furniture</title>
  <link rel="stylesheet" href="css/contact.css">
  <link rel="stylesheet" href="css/header.css">
</head>

<body>

  <header>
    <h1>WoodCraft Furniture</h1>
    <nav>
      <div class="search-bar">
        <input type="text" placeholder="Search your choice">
        <button type="submit">Search</button>
      </div>
      <div class="hamburger" id="hamburger">
        ☰
      </div>
      <ul id="navMenu">
        <li><a href="home.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="contact">
    <div class="contact-container">
      <h2>Contact Us</h2>
      <p>We'd love to hear from you! Whether you have a question about products, pricing, or anything else, our team is
        ready to help.</p>

      <form class="contact-form" action="#" method="post">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 WoodCraft Furniture. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>

</body>

</html>
