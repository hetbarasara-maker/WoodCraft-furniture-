<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="css/style3.css">
  <link rel="stylesheet" href="css/header.css">
</head>

<body>

  <header>
    <h1>WoodCraft Furniture</h1>
    <nav>
      <div class="search-bar">
        <input type="text" placeholder="Search your choice">
        <button type="submit">Search</button>
      </div>
      <div class="hamburger" id="hamburger">
        ☰
      </div>
      <ul id="navMenu">
        <li><a href="home.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="cart container">
    <h2>Your Cart</h2>

    <div class="cart-item">
      <img src="/image/zeke_sofa.jpg" alt="Product Image">
      <div class="cart-details">
        <h3>Zeke Faux Sofa</h3>
        <p>Quantity: 2</p>
        <p>Price: ₹18,499</p>
      </div>
      <div class="cart-total">₹36,998</div>
    </div>

    <div class="cart-item">
      <img src="/image/clay_dining.jpg" alt="Product Image">
      <div class="cart-details">
        <h3>Another Product</h3>
        <p>Quantity: 1</p>
        <p>Price: ₹99,999</p>
      </div>
      <div class="cart-total">₹99,999</div>
    </div>

    <div class="cart-summary">
      <h3>Total: ₹1,36,997</h3>
      <a href="checkout.html" class="buy-btn">Proceed to Checkout</a>
    </div>
  </section>

  <footer>
    <p>&copy; 2025 WoodCraft Furniture. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>

</body>

</html>
