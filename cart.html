<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="css/style3.css">
</head>
<body>

  <header class="header">
    <div class="container">
      <h1>WoodCraft Furniture</h1>
      <nav class="navbar">
       <div class="search-bar">
       <input type="text" placeholder="Search your choice">
       <button type="submit">Search</button>
       </div>
        <a href="pr1.html">Home</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <section class="cart container">
    <h2>Your Cart</h2>

    <div class="cart-item">
      <img src="/image/zeke_sofa.jpg" alt="Product Image">
      <div class="cart-details">
        <h3>Zeke Faux Sofa</h3>
        <p>Quantity: 2</p>
        <p>Price: ₹18,499</p>
      </div>
      <div class="cart-total">₹36,998</div>
    </div>

    <div class="cart-item">
      <img src="/image/clay_dining.jpg" alt="Product Image">
      <div class="cart-details">
        <h3>Another Product</h3>
        <p>Quantity: 1</p>
        <p>Price: ₹99,999</p>
      </div>
      <div class="cart-total">₹99,999</div>
    </div>

    <div class="cart-summary">
      <h3>Total: ₹1,36,997</h3>
      <a href="checkout.html" class="buy-btn">Proceed to Checkout</a>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2025 My Store</p>
  </footer>

</body>
</html>
