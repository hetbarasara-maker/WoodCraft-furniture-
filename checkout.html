<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout</title>
  <link rel="stylesheet" href="css/style3.css">
  <link rel="stylesheet" href="css/header.css">
</head>

<body>

  <header>
    <h1>WoodCraft Furniture</h1>
    <nav>
      <div class="search-bar">
        <input type="text" placeholder="Search your choice">
        <button type="submit">Search</button>
      </div>
      <div class="hamburger" id="hamburger">
        ☰
      </div>
      <ul id="navMenu">
        <li><a href="home.html">Home</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>


  <section class="checkout container">
    <h2>Checkout</h2>

    <form class="checkout-form">
      <label>
        Full Name
        <input type="text" placeholder="Enter Your Name" required>
      </label>

      <label>
        Email
        <input type="email" placeholder="xyz@example.com" required>
      </label>

      <label>
        Shipping Address
        <input type="text" placeholder="123 Main St" required>
      </label>

      <label>
        City
        <input type="text" placeholder="City" required>
      </label>

      <label>
        Postal Code
        <input type="text" placeholder="123456" required>
      </label>

      <label>
        Country
        <input type="text" placeholder="Country" required>
      </label>

      <label>
        Payment Method
        <select required>
          <option value="">Select Your Payment Type</option>
          <option value="cod">Cash On Delivery</option>
          <option value="upi">UPI</option>
        </select>
      </label>


      <button type="submit" class="buy-btn">Place Order</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 WoodCraft Furniture. All rights reserved.</p>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
