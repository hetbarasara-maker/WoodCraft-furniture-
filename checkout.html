<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout</title>
  <link rel="stylesheet" href="css/style3.css">
</head>
<body>

  <header class="header">
  <div class="container">
    <!-- Company Name -->
    <div class="name">
                <h1>WoodCraft Furniture</h1>
            </div>
    
    <!-- Search Bar Section -->
    <div class="search-bar">
      <input type="text" placeholder="Search your choice" aria-label="Search">
      <button type="submit">Search</button>
    </div>
    
    <!-- Navigation Bar -->
    <nav class="navbar">
      <a href="pr1.html">Home</a>
      <a href="cart.html">Cart</a>
      <a href="checkout.html">Checkout</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>


  <section class="checkout container">
    <h2>Checkout</h2>

    <form class="checkout-form">
      <label>
        Full Name
        <input type="text" placeholder="Enter Your Name" required>
      </label>

      <label>
        Email
        <input type="email" placeholder="xyz@example.com" required>
      </label>

      <label>
        Shipping Address
        <input type="text" placeholder="123 Main St" required>
      </label>

      <label>
        City
        <input type="text" placeholder="City" required>
      </label>

      <label>
        Postal Code
        <input type="text" placeholder="123456" required>
      </label>

      <label>
        Country
        <input type="text" placeholder="Country" required>
      </label>
      
<label>
  Payment Method
  <select required>
    <option value="">Select Your Payment Type</option>
    <option value="cod">Cash On Delivery</option>
    <option value="upi">UPI</option>
  </select>
</label>


      <button type="submit" class="buy-btn">Place Order</button>
    </form>
  </section>

  <footer class="footer">
    <p>&copy; 2025 My Store</p>
  </footer>

</body>
</html>
